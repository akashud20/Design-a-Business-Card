<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Menu</title>
    <title>Business Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="business-card">
      <img
        class="profile-image"
        src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
        alt="Profile Image"
      />
      <p class="full-name">John Doe</p>
      <p class="designation">Software Engineer</p>
      <p class="company">ABC Company</p>
      <hr />
      <p class="email">Mail: john.doe@example.com</p>
      <p class="phone">Phone: (123) 456-7890</p>
      <a class="portfolio-link" href="http://" target="_blank">Portfolio</a>
      <hr />
      <div class="social-media">
        <h2>Connect with me</h2>
        <a href="http://" target="_blank">Twitter</a>
        <a href="http://" target="_blank">LinkedIn</a>
        <a href="http://" target="_blank">GitHub</a>
      </div>
    </div>
  </body>
</html>
