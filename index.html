<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Business Card</title>
  </head>

  <body>
    <div class="business-card">
      <img
        class="profile-image"
        src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
        alt="Profile Image"
      />
      <p class="full-name">John Doe</p>
      <p class="designation">Software Engineer</p>
      <p class="company">ABC Company</p>
      <hr />
      <p class="email">john.doe@example.com</p>
      <p class="phone">(123) 456-7890</p>
      <a class="portfolio-link" href="http://">Portfolio</a>
      <hr />
      <div class="social-media">
        <h2>Connect with me</h2>
        <a href="http://">Twitter</a>
        <a href="http://">LinkedIn</a>
        <a href="http://">GitHub</a>
      </div>
    </div>
  </body>
</html>
